<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Récupération de variable d'URL</title>
</head>
<body>
    <h1>Variable d'URL récupérée</h1>
    <p id="resultat"></p>

    <script>
        // Récupération des paramètres de l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const coucou = urlParams.get('coucou');

        // Affichage du résultat
        const resultatElement = document.getElementById('resultat');
        if (coucou) {
            resultatElement.textContent = `La variable "coucou" vaut : ${coucou}`;
        } else {
            resultatElement.textContent = 'La variable "coucou" n\'est pas définie dans l\'URL.';
        }
    </script>
</body>
</html>
